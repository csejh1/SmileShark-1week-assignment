name: CI/CD Trigger (Frontend Deploy + Backend Pipeline)

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_ARN }}
  S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
  CF_DISTRIBUTION_ID: ${{ secrets.CF_DISTRIBUTION_ID }}
  WAS_PIPELINE: "petclinic-was-pipeline"
  WEB_PIPELINE: "petclinic-web-pipeline"

jobs:
  trigger-backend-pipelines:
    name: Trigger CodePipeline (WAS & WEB)
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger WAS Pipeline
        run: aws codepipeline start-pipeline-execution --name $WAS_PIPELINE

      - name: Trigger WEB Pipeline
        run: aws codepipeline start-pipeline-execution --name $WEB_PIPELINE

  deploy-frontend:
    name: Build & Deploy Frontend to S3/CloudFront
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Dependencies
        working-directory: spring-petclinic-reactjs/client
        run: npm install --legacy-peer-deps

      - name: Build React App
        working-directory: spring-petclinic-reactjs/client
        run: npm run build:prod

      - name: Sync to S3
        run: aws s3 sync spring-petclinic-reactjs/client/public/ s3://$S3_BUCKET/ --delete

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CF_DISTRIBUTION_ID \
            --paths "/*"
