# DB 초기화 — CREATE TABLE IF NOT EXISTS + INSERT IGNORE 로 멱등성 보장, 재시작 시 무해
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath*:db/mysql/initDB.sql
spring.sql.init.data-locations=classpath*:db/mysql/populateDB.sql

# MySQL config start
#----------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/petclinic?useUnicode=true}
spring.datasource.username=${DB_USERNAME:pc}
spring.datasource.password=${DB_PASSWORD:petclinic}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database=MYSQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none

# AWS 환경 필수 설정 (HikariCP 커넥션 유지)
spring.datasource.hikari.max-lifetime=580000
spring.datasource.hikari.keepalive-time=30000
#----------------------------------------------------------------
# MySQL config end 
